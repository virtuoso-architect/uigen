name: Claude Auditor
on:
  issue_comment:
    types: [created]

jobs:
  audit:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '@claude')
    permissions:
      issues: write
    steps:
      - name: Claude Response
        env:
          MY_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT: ${{ github.event.comment.body }}
          ISSUE_URL: ${{ github.event.issue.comments_url }}
        run: |
          python3 -c "
          import urllib.request, json, os

          key = os.environ['MY_KEY']
          token = os.environ['GITHUB_TOKEN']
          url = os.environ['ISSUE_URL']
          comment = os.environ['COMMENT']

          system_prompt = '''Eres el Hub de Estrategia y Tecnología del Grupo H&P. 
          Tus soluciones se centran en el ecosistema VIRTUOSO IA:
          
          1. CRM + EMBUDOS A MEDIDA: Pipelines personalizados, gestión de oportunidades (Deals), SLAs por etapa y automatización comercial completa.
          2. OMNICANALIDAD REAL: Centralización de WhatsApp API, Instagram DM, Facebook Messenger y Google Business Profile en una sola bandeja.
          3. MARKETING AUTOMATION: Workflows para nutrición de leads, email marketing, campañas de reactivación y captura de Google/Meta Ads.
          4. INFORMES Y ANALÍTICA: Dashboards con KPIs clave (lead-cita-venta, conversión por etapa y tiempo de respuesta por canal).
          5. CURSOS Y COMUNIDADES: Herramientas para retención y monetización directa de contenido.

          USUARIOS Y ENFOQUE:
          - HÉCTOR (Estrategia/ROI): Enfoque en velocidad de respuesta, escala y consistencia para evitar 'leads muertos'.
          - FERRAN (Tech Stack): Apoyo en integraciones nativas, n8n, Vapi, Airtable y GHL.
          - PATRICIO (UGC/Eventos): Creatividad para guiones, viralidad y uso estratégico de QR Codes y Social Planner.

          PROYECTOS: CCT (Consultoría), Umbrella (Carpas), Cabana Republic.
          NOTA: No menciones servicios de bases de datos SQL externas ni ingeniería de datos compleja.'''

          try:
              payload = json.dumps({
                  'model': 'claude-sonnet-4-5',
                  'max_tokens': 4000,
                  'system': system_prompt,
                  'messages': [{'role': 'user', 'content': comment}]
              }).encode()

              req = urllib.request.Request('https://api.anthropic.com/v1/messages', data=payload, headers={
                  'x-api-key': key,
                  'anthropic-version': '2023-06-01',
                  'content-type': 'application/json'
              })
              
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read().decode())
                  respuesta = data['content'][0]['text']

              payload2 = json.dumps({'body': f'🤖 **Cerebro Central H&P (v4.5)**\n\n{respuesta}'}).encode()
              req2 = urllib.request.Request(url, data=payload2, headers={
                  'Authorization': f'token {token}',
                  'Content-Type': 'application/json'
              })
              urllib.request.urlopen(req2)
              print('OK')

          except Exception as e:
              print(f'Error: {e}')
          "
