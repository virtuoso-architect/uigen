name: Claude Auditor
on:
  issue_comment:
    types: [created]
jobs:
  audit:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '@claude')
    steps:
      - name: Claude Response
        env:
          MY_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COMMENT: ${{ github.event.comment.body }}
        run: |
          # Extrae la URL del comentario (asume formato: @claude https://dominio.com)
          DOMINIO=$(echo "$COMMENT" | grep -oP 'https?://[^\s]+')
          
          curl https://api.anthropic.com/v1/messages \
            -H "x-api-key: $MY_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d "{
                \"model\": \"claude-sonnet-4-5\",
                \"max_tokens\": 1024,
                \"messages\": [{
                  \"role\": \"user\",
                  \"content\": \"Analiza $DOMINIO y dame 3 puntos de mejora críticos para un hotel de lujo.\"
                }]
              }"
```

**Uso en el issue:**
```
@claude https://posadadeltepozteco.com.mx
