name: Claude Auditor
on:
  issue_comment:
    types: [created]
jobs:
  audit:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '@claude')
    permissions:
      issues: write
    steps:
      - name: Claude Response
        env:
          MY_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT: ${{ github.event.comment.body }}
          ISSUE_URL: ${{ github.event.issue.comments_url }}
        run: |
          python3 -c "
          import urllib.request, json, os
          key = os.environ['MY_KEY']
          token = os.environ['GITHUB_TOKEN']
          url = os.environ['ISSUE_URL']
          comment = os.environ['COMMENT']
          system_prompt = '''Eres el Hub de Estrategia y Tecnologia del Grupo H&P. 
          Tus soluciones base se centran en VIRTUOSO IA, cuya capacidad real es:
          
          1. INFRAESTRUCTURA DE DATOS: Auditoria de Excels, creacion de bases de datos SQL (PostgreSQL/MySQL) y Dashboards en Power BI Premium.
          2. CRM Y EMBUDOS: Pipelines personalizados, SLAs por etapa, etiquetado inteligente y segmentacion.
          3. OMNICANALIDAD: WhatsApp API, Google Business Profile, Instagram DM y Chat Widgets unificados.
          4. AUTOMATIZACION COMERCIAL: Workflows avanzados, Email Marketing y captura de Facebook/Google Ads.
          5. ECOSISTEMA IA: Integraciones MCP (Model Context Protocol) para agentes como herramientas con trazabilidad y gobernanza.
          USUARIOS:
          - HECTOR (Estrategia/Venta): Enfocate en resolver el triangulo doloroso (Velocidad, Escala, Consistencia) y la Fuente Unica de Verdad. 
          - FERRAN (Tech Stack): Apoyalo con ETL/ELT, conexiones SQL, n8n, Vapi, Airtable, GHL y estructuras JSON.
          - PATRICIO (UGC/Eventos): Creatividad, viralidad y guiones, integrando QR Codes y Social Planner.
          REGLA: No menciones software externo no listado. Si el proyecto es CCT, Umbrella o Cabana Republic, adapta la infraestructura de Virtuoso a esos modelos.'''
          try:
              payload = json.dumps({
                  'model': 'claude-sonnet-4-5',
                  'max_tokens': 4000,
                  'system': system_prompt,
                  'messages': [{'role': 'user', 'content': comment}]
              }).encode()
              req = urllib.request.Request('https://api.anthropic.com/v1/messages', data=payload, headers={
                  'x-api-key': key,
                  'anthropic-version': '2023-06-01',
                  'content-type': 'application/json'
              })
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read().decode())
                  respuesta = data['content'][0]['text']
              payload2 = json.dumps({'body': f'🤖 **Cerebro Central H&P**\n\n{respuesta}'}).encode()
              req2 = urllib.request.Request(url, data=payload2, headers={
                  'Authorization': f'token {token}',
                  'Content-Type': 'application/json'
              })
              urllib.request.urlopen(req2)
              print('OK')
          except Exception as e:
              print(f'Error: {e}')
          "
