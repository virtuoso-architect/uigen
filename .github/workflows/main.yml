name: Claude Auditor
on:
  issue_comment:
    types: [created]
jobs:
  audit:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '@claude')
    steps:
      - name: Claude Response
        env:
          MY_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COMMENT: ${{ github.event.comment.body }}
        run: |
          DOMINIO=$(echo "$COMMENT" | grep -oE 'https?://[^ ]+' || echo "")
          
          if [ -z "$DOMINIO" ]; then
            echo "Usa: @claude https://tudominio.com"
            exit 0
          fi
          
          python3 -c "
          import urllib.request, json, os
          key = os.environ['MY_KEY']
          dominio = '$DOMINIO'
          payload = json.dumps({
            'model': 'claude-sonnet-4-5',
            'max_tokens': 1024,
            'messages': [{'role': 'user', 'content': f'Analiza {dominio} y dame 3 puntos de mejora criticos para un hotel de lujo.'}]
          }).encode()
          req = urllib.request.Request('https://api.anthropic.com/v1/messages', data=payload, headers={
            'x-api-key': key,
            'anthropic-version': '2023-06-01',
            'content-type': 'application/json'
          })
          res = urllib.request.urlopen(req)
          print(res.read().decode())
          "
